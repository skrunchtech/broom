<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B6914;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8922A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bristleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F4A460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CD853F;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Broom handle (diagonal stick) -->
  <line x1="30" y1="15" x2="85" y2="72"
        stroke="url(#handleGrad)" stroke-width="7" stroke-linecap="round"/>

  <!-- Binding / ferrule where handle meets bristles -->
  <rect x="72" y="63" width="18" height="10" rx="3"
        fill="#8B6914" transform="rotate(45 81 68)"/>

  <!-- Bristles (fan shape) -->
  <g fill="url(#bristleGrad)" opacity="0.95">
    <!-- Left bristle -->
    <polygon points="68,82 58,110 66,112 74,85"/>
    <!-- Center-left bristle -->
    <polygon points="76,80 72,110 80,110 82,82"/>
    <!-- Center-right bristle -->
    <polygon points="84,78 86,108 94,106 88,78"/>
    <!-- Right bristle -->
    <polygon points="90,74 98,100 106,96 94,72"/>
  </g>

  <!-- Bristle cap -->
  <ellipse cx="82" cy="82" rx="18" ry="7"
           fill="#C8922A" transform="rotate(45 82 82)"/>

  <!-- Sparkle dots (swept dust) -->
  <circle cx="20" cy="95" r="3" fill="#F4A460" opacity="0.7"/>
  <circle cx="10" cy="105" r="2" fill="#F4A460" opacity="0.5"/>
  <circle cx="30" cy="108" r="2.5" fill="#CD853F" opacity="0.6"/>
  <circle cx="15" cy="85" r="1.5" fill="#F4A460" opacity="0.4"/>
  <circle cx="40" cy="100" r="1.5" fill="#CD853F" opacity="0.5"/>
</svg>
